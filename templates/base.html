<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Satisfactory Planner{% endblock %}</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        :root {
            --bg: #f8f9fa;
            --card-bg: #ffffff;
            --text: #212529;
            --muted: #888888;
            --accent: #1e3a8a;
            --border: #dee2e6;
        }
        body {
            background: var(--bg);
            font-family: system-ui, -apple-system, sans-serif;
            color: var(--text);
        }
        .navbar {
            background: var(--card-bg);
            border-bottom: 1px solid var(--border);
            z-index: 1000;
        }
        .card {
            border: 1px solid var(--border);
            border-radius: 8px;
            transition: box-shadow 0.15s;
        }
        .card:hover {
            box-shadow: 0 2px 8px rgba(0,0,0,0.08);
        }
        .item-icon {
            width: 48px;
            height: 48px;
            object-fit: contain;
        }
        .stat-number {
            font-family: 'SF Mono', 'Courier New', monospace;
            color: var(--accent);
            font-weight: 600;
        }
        .placeholder-icon {
            width: 48px;
            height: 48px;
            background: #e9ecef;
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            color: #888;
            font-size: 18px;
            text-transform: uppercase;
            flex-shrink: 0;
        }
        .placeholder-icon.liquid {
            border-radius: 50%;
        }
        .placeholder-icon.small {
            width: 24px;
            height: 24px;
            font-size: 12px;
            border-radius: 4px;
        }
        .placeholder-icon.small.liquid {
            border-radius: 50%;
        }
        [data-theme="dark"] {
            --bg: #1a1a2e;
            --card-bg: #16213e;
            --text: #e0e0e0;
            --muted: #aaa;
            --accent: #7b9cff;
            --border: #2a2a4a;
        }
        [data-theme="dark"] body {
            color: #e0e0e0;
        }
        [data-theme="dark"] .navbar {
            background: #0f3460;
            border-color: #2a2a4a;
        }
        [data-theme="dark"] .navbar-brand {
            color: #fff !important;
        }
        [data-theme="dark"] #recipe-preview {
            background: #1a1a2e !important;
            color: #e0e0e0;
            border-color: #2a2a4a;
        }
        [data-theme="dark"] #panel-search::placeholder {
            color: #888;
        }
        [data-theme="dark"] #view-actions .btn {
            color: #e0e0e0;
        }
        [data-theme="dark"] #view-actions .btn-outline-success {
            border-color: #4caf50;
            color: #4caf50;
        }
        [data-theme="dark"] #view-actions .btn-outline-warning {
            border-color: #ffc107;
            color: #ffc107;
        }
        [data-theme="dark"] .like-btn,
        [data-theme="dark"] .bookmark-btn {
            color: #e0e0e0;
        }
        [data-theme="dark"] .card {
            background: #16213e;
            border-color: #2a2a4a;
            color: #e0e0e0;
        }
        [data-theme="dark"] .card h5,
        [data-theme="dark"] .card .fw-semibold {
            color: #fff;
        }
        [data-theme="dark"] .resource-card,
        [data-theme="dark"] .recipe-card,
        [data-theme="dark"] .structure-card {
            background: #1a1a2e;
            border-color: #2a2a4a;
            color: #e0e0e0;
        }
        [data-theme="dark"] .bg-white {
            background: #16213e !important;
        }
        [data-theme="dark"] .text-muted {
            color: #aaa !important;
        }
        [data-theme="dark"] .border,
        [data-theme="dark"] .border-end,
        [data-theme="dark"] .border-start,
        [data-theme="dark"] .border-bottom {
            border-color: #2a2a4a !important;
        }
        [data-theme="dark"] .badge.bg-light {
            background: #1a1a2e !important;
            color: #e0e0e0 !important;
        }
        [data-theme="dark"] .nav-link {
            color: #ccc;
        }
        [data-theme="dark"] .nav-link:hover {
            color: #fff;
        }
        [data-theme="dark"] #build-area {
            background: #1a1a2e !important;
        }
        [data-theme="dark"] #panel-tabs .tab-link {
            color: #aaa;
        }
        [data-theme="dark"] #panel-tabs .tab-link.active {
            color: #fff;
            border-bottom-color: #7b9cff;
        }
        [data-theme="dark"] .modal-content {
            background: #16213e;
            color: #e0e0e0;
        }
        [data-theme="dark"] .modal-header {
            border-color: #2a2a4a;
        }
        [data-theme="dark"] .btn-close {
            filter: invert(1);
        }
        [data-theme="dark"] .form-control,
        [data-theme="dark"] .form-select {
            background: #1a1a2e;
            color: #e0e0e0;
            border-color: #2a2a4a;
        }
        [data-theme="dark"] .form-control:focus,
        [data-theme="dark"] .form-select:focus {
            background: #1a1a2e;
            color: #fff;
        }
    </style>
    {% block extra_css %}{% endblock %}
</head>
<body>
    <nav class="navbar navbar-expand-lg sticky-top">
        <div class="container">
            <a class="navbar-brand fw-bold" href="{% url 'home' %}">Satisfactory Planner</a>
            <div class="d-flex gap-3 align-items-center">
                <a href="{% url 'home' %}" class="nav-link">Главная</a>
                {% if user.is_authenticated %}
                    <a href="{% url 'my_lines' %}" class="nav-link">Мои цепочки</a>
                    <a href="{% url 'profile' %}" class="nav-link">Профиль</a>
                    <form method="post" action="{% url 'logout' %}" class="d-inline mb-0">
                        {% csrf_token %}
                        <button type="submit" class="nav-link border-0 bg-transparent">Выйти</button>
                    </form>
                {% else %}
                    <a href="{% url 'login' %}" class="nav-link">Войти</a>
                {% endif %}
                <button class="btn btn-sm btn-outline-secondary ms-2" id="theme-toggle" title="Тёмная тема">🌙</button>
            </div>
        </div>
    </nav>

    <main class="container mt-4">
        {% block content %}{% endblock %}
    </main>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    {% block extra_js %}{% endblock %}
    <script>
        const themeToggle = document.getElementById('theme-toggle');
        const savedTheme = localStorage.getItem('theme');
        if (savedTheme === 'dark') {
            document.documentElement.setAttribute('data-theme', 'dark');
            themeToggle.textContent = '☀️';
        }

        themeToggle.addEventListener('click', () => {
            const isDark = document.documentElement.getAttribute('data-theme') === 'dark';
            if (isDark) {
                document.documentElement.removeAttribute('data-theme');
                localStorage.setItem('theme', 'light');
                themeToggle.textContent = '🌙';
            } else {
                document.documentElement.setAttribute('data-theme', 'dark');
                localStorage.setItem('theme', 'dark');
                themeToggle.textContent = '☀️';
            }
        });
    </script>
</body>
</html>
